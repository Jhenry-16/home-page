<div class="error-container">
  <div class="error-content animacion-arriba">
    <div class="error-icon">
      <mat-icon>lock_person</mat-icon>
      <span class="error-code">401</span>
    </div>
    <h1 class="titulo-secundario">No Autorizado</h1>
    <p class="parrafo-secundario">
      Lo sentimos, necesitas iniciar sesión para acceder a esta sección. Por favor, identifícate para continuar.
    </p>
    <div class="error-actions">
      <button mat-raised-button color="accent" (click)="volverLogin()">
        <mat-icon>login</mat-icon>
        Ir al Login
      </button>
    </div>
  </div>
</div>
