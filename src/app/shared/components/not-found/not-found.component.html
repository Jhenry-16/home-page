<div class="error-container">
  <div class="error-content animacion-arriba">
    <div class="error-icon">
      <mat-icon>search_off</mat-icon>
      <span class="error-code">404</span>
    </div>
    <h1 class="titulo-secundario">¡Vaya! Página no encontrada</h1>
    <p class="parrafo-secundario">Parece que la página que buscas se ha tomado unas vacaciones o nunca existió.</p>
    <div class="error-actions">
      <button mat-raised-button color="primary" (click)="volverHome()">
        <mat-icon>home</mat-icon>
        Volver al Inicio
      </button>
    </div>
  </div>
</div>
