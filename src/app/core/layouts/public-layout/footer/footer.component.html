<footer>
  <div class="row container full-width">
    <div class="col-12 col-sm-3 footer-brand">
      <div class="logo-footer">
        <img src="assets/images/logos/logo-blanco.png" alt="logo-footer" />
      </div>
      <p>José Luis Casas Carrión<br />Candidato a la Alcaldía de Pueblo Libre</p>
    </div>

    <div class="col-12 col-sm-3 mb-4 py-sm-0">
      <h4>Síguenos en redes</h4>
      <div class="social">
        <a href="https://www.facebook.com/JoseCasasOficial" target="_blank" aria-label="Facebook">
          <img src="assets/images/iconos/facebook.png" alt="Facebook" />
        </a>

        <a
          href="https://www.instagram.com/josecasascarrion/"
          target="_blank"
          aria-label="Instagram"
        >
          <img src="assets/images/iconos/instagram.png" alt="Instagram" />
        </a>

        <a
          href="https://www.tiktok.com/@josecasascarrion?_r=1&_t=ZS-97LhnDizHJy"
          target="_blank"
          aria-label="TikTok"
        >
          <img src="assets/images/iconos/tiktok.png" alt="TikTok" />
        </a>
      </div>
    </div>

    <div class="col-6 col-sm-3 mb-4 py-sm-0">
      <h4>Contáctanos</h4>
      <p>987 654 321</p>
      <p>hola&#64;josecasas.pe</p>
    </div>

    <div class="col-6 col-sm-3">
      <h4>Únete al canal de WhatsApp</h4>

      <button mat-flat-button class="btn-whatsapp" (click)="grupoWhatsapp()">
        <img src="assets/images/iconos/whatsapp.png" alt="Icono de WhatsApp" />
        <span>Unirme</span>
      </button>
    </div>
  </div>

  <div class="footer-bottom">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
      <span>© {{ anioActual }} Todo lo derechos reservados.</span>
      <span>Equipo de desarrollo.</span>
    </div>
  </div>
</footer>
