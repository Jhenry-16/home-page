<header class="header" [class.sticky]="isSticky">
  <mat-toolbar class="header-toolbar">
    <div class="container">
      <div class="row align-items-center w-100 gx-0">
        <!-- Logo -->
        <div class="col-lg-2 col-md-6 col-8">
          <a routerLink="/" class="logo" aria-label="Ir al inicio">
            <img
              [src]="
                isSticky
                  ? '/assets/images/logos/logo-azul.png'
                  : '/assets/images/logos/logo-blanco.png'
              "
              alt="Logo"
            />
          </a>
        </div>

        <!-- Navegación Desktop -->
        <div class="col-lg-8 d-none d-lg-flex justify-content-center">
          <nav aria-label="Menú principal">
            <ul class="menu">
              @for (nav of navMenu; track nav.seccion) {
                <li [class.active]="activarSeccion === nav.seccion">
                  <button mat-button type="button" (click)="scrollTo(nav.seccion)">
                    {{ nav.nombre }}
                  </button>
                </li>
              }
            </ul>
          </nav>
        </div>

        <!-- Botón Desktop -->
        <div class="col-lg-2 d-none d-lg-flex justify-content-end">
          <button mat-flat-button color="primary" type="button">Acceder</button>
        </div>

        <!-- Botón menú móvil -->
        <div class="col-md-6 col-4 d-lg-none text-end">
          <button mat-icon-button type="button" aria-label="Abrir menú" (click)="openMobileMenu()">
            <mat-icon>menu</mat-icon>
          </button>
        </div>
      </div>
    </div>
  </mat-toolbar>
</header>
