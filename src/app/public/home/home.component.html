<section id="propuestas">
  <div class="container" animacion="fade-up">
    <h2 class="titulo-seccion">Mis principales propuestas</h2>
    <div class="cards-propuestas">
      <mat-card class="texto-propuestas" *ngFor="let p of propuestas">
        <mat-card-header>
          <div mat-card-avatar class="icon-container">
            <mat-icon>{{ p.icon }}</mat-icon>
          </div>
          <mat-card-title
            ><h3>{{ p.title }}</h3></mat-card-title
          >
        </mat-card-header>

        <mat-card-content>
          <mat-list>
            <mat-list-item *ngFor="let item of p.items">
              <mat-icon matListItemIcon class="bullet-icon">chevron_right</mat-icon>
              <span matListItemTitle class="bullet-text">{{ item }}</span>
            </mat-list-item>
          </mat-list>
        </mat-card-content>
      </mat-card>
    </div>
    <!-- <div class="d-flex align-items-center justify-content-center mt-4">
      <button mat-flat-button color="primary">
        <mat-icon>add_box</mat-icon>
        MÁS PROPUESTAS
      </button>
    </div> -->
  </div>
</section>
