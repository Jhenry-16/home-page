<section class="social-section">
  <div class="container">
    <div class="text-center mb-2" animacion="fade-up">
      <span class="badge-social">
        <mat-icon color="accent">play_circle</mat-icon>
        NUESTRAS REDES
      </span>
    </div>

    <div class="text-center" animacion="fade-up">
      <h2 class="titulo-seccion">Videos destacados</h2>
      <p class="subtitle">Descubre lo más reciente y relevante de nuestras redes sociales.</p>
    </div>

    <div
      class="slider-wrapper"
      animacion="zoom-in"
      (mouseenter)="pauseAutoplay()"
      (mouseleave)="resumeAutoplay()"
    >
      <!-- Flecha izquierda -->
      <button class="slider-arrow prev" type="button" (click)="prevSlide()">
        <mat-icon>chevron_left</mat-icon>
      </button>

      <!-- Tarjetas -->
      <div class="cards-container">
        <div
          class="cards-track"
          [style.transform]="trackTransform"
          [style.transition]="transitionEnabled ? 'transform .4s ease' : 'none'"
          (transitionend)="onTransitionEnd()"
        >
          <div
            class="video-card"
            *ngFor="let video of clonedVideos; let i = index"
            [class.active]="i === currentIndex"
            (click)="goToCard(i)"
          >
            <!-- HEADER -->
            <div class="header">
              <div class="social">
                <img
                  [src]="'assets/images/iconos/' + video.social + '-color.png'"
                  [alt]="video.social"
                />

                <div>
                  <h5>{{ video.social | titlecase }}</h5>
                  <small>{{ video.user }}</small>
                </div>
              </div>

              <button mat-icon-button>
                <mat-icon>more_horiz</mat-icon>
              </button>
            </div>

            <!-- Imagen -->
            <img class="cover" [src]="video.imagen" [alt]="video.title" />

            <!-- Play -->
            <button class="play" (click)="abrirVideo(video.urlvideo)">
              <mat-icon>play_arrow</mat-icon>
            </button>

            <!-- Gradiente -->
            <div class="gradient"></div>

            <!-- Contenido -->
            <div class="content">
              <h4>{{ video.title }}</h4>

              <div class="stats">
                <span>
                  <mat-icon>favorite</mat-icon>
                  {{ video.likes }}
                </span>

                <span>
                  <mat-icon>chat_bubble</mat-icon>
                  {{ video.comments }}
                </span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Flecha derecha -->
      <button class="slider-arrow next" type="button" (click)="nextSlide()">
        <mat-icon>chevron_right</mat-icon>
      </button>
    </div>

    <!-- PAGINADOR -->
    <div class="pagination-custom">
      <span
        *ngFor="let video of videos; let i = index"
        [class.active]="i === activeIndex"
        (click)="goToSlide(i)"
      ></span>
    </div>
  </div>
</section>
